<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>attendance</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #EDE7B1; 
            color: #495057;
        }
        
        header {
            background-color: #E4C1F9;
            color: white;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .class_name {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: bold;
            font-style: italic;
            color: #ffffff;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 25px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            padding: 8px 12px;
            border-radius: 10px;
        }

        .content-wrapper {
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        .container {
            background: #ffffff;
            padding: 50px 40px;
            width: 100%;
            max-width: 600px; 
            border: 1px solid #ced4da; 
            border-radius: 20px;
            border-left: 2px solid #E4C1F9;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #F694C1; 
            text-align: center;
            margin-bottom: 40px;
            font-weight: 700;
            font-size: 32px;
            font-style: italic;
            margin-top: 0;
        }

        label {
            font-size: 13px;
            font-weight: bold;
            color: #495057; 
            display: block;
            margin-top: 20px;
        }

        input, select {
            width: 100%;
            padding: 15px; 
            margin: 10px 0px;
            border: 2px solid #D3F8E2;
            border-radius: 12px;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
            font-size: 15px;
            background-color: #f8f9fa;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #E4C1F9; 
            color: #ffffff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
            font-size: 16px;
            margin-top: 30px;
            letter-spacing: 1px;
        }

        hr {
            margin-top: 40px;
            border: 0;
            border-top: 2px dashed #D3F8E2;
        }

        #output {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        #output img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <header>
        <div class="class_name">10 - Emerald</div>
        <nav>
            <ul>
                <li><a href="index.html">classmates</a></li>
                <li><a href="attendancesheet.html">attendance tracker</a></li>
                <li><a href="gallery.html">gallery</a></li>
            </ul>
        </nav>
    </header>

    <div class="content-wrapper">
        <div class="container">
            <h1>Attendance Tracker</h1>

            <label for="day">Select Day</label>
            <select id="day">
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
            </select>

            <label for="absences">Number of Absences</label>
            <input type="number" id="absences" placeholder="0">
            
            <button id="submit-button" py-click="add_data">Update Tracker</button>

            <hr>

            <div id="output">
            </div>
        </div>
    </div>

    <script type="py" src="main.py" config='{"packages":["numpy", "matplotlib"]}'></script>

</body>
</html>
